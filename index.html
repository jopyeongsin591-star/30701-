<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 할 일 앱</title>

<style>
body{
    background:#f2f5f9;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    margin-top:40px;
}

.container{
    width:450px;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#333;
}

.guide{
    color:#666;
    text-align:center;
    margin-bottom:20px;
    line-height:1.5;
}

.input-area{
    display:flex;
    gap:10px;
}

#todoInput{
    flex:1;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:10px;
}

#addButton{
    background:#4CAF50;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
}

#addButton:hover{
    background:#3f9a43;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#eef2ff;
    margin-top:15px;
    padding:15px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.todo-text{
    font-size:16px;
    color:#222;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

.buttons{
    display:flex;
    gap:8px;
}

.completeBtn{
    background:#2196F3;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

.deleteBtn{
    background:#f44336;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<h1>📝 나만의 할 일 앱</h1>

<div class="guide">
할 일을 입력한 후 <b>추가</b> 버튼을 누르세요.<br>
완료 버튼으로 완료 표시를 하고 삭제 버튼으로 제거할 수 있습니다.
</div>

<div class="input-area">
<input type="text" id="todoInput" placeholder="할 일을 입력하세요">
<button id="addButton">추가</button>
</div>

<ul id="todoList"></ul>

</div>

<script>

const input = document.getElementById("todoInput");
const addButton = document.getElementById("addButton");
const todoList = document.getElementById("todoList");

function addTodo(){

    const text = input.value.trim();

    // 빈칸 방지
    if(text === ""){
        alert("할 일을 입력해주세요.");
        return;
    }

    const li = document.createElement("li");

    const span = document.createElement("span");
    span.className = "todo-text";
    span.textContent = text;

    const buttons = document.createElement("div");
    buttons.className = "buttons";

    const completeBtn = document.createElement("button");
    completeBtn.textContent = "완료";
    completeBtn.className = "completeBtn";

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "삭제";
    deleteBtn.className = "deleteBtn";

    completeBtn.onclick = function(){
        span.classList.toggle("completed");
    };

    deleteBtn.onclick = function(){
        li.remove();
    };

    buttons.appendChild(completeBtn);
    buttons.appendChild(deleteBtn);

    li.appendChild(span);
    li.appendChild(buttons);

    todoList.appendChild(li);

    input.value="";
    input.focus();
}

addButton.addEventListener("click", addTodo);

input.addEventListener("keydown", function(event){
    if(event.key==="Enter"){
        addTodo();
    }
});

</script>

</body>
</html>
